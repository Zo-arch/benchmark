spring.application.name=benchmark-app
server.port=8081

# Datasource (variáveis de ambiente: SPRING_DATASOURCE_*)
spring.datasource.url=jdbc:postgresql://${SPRING_DATASOURCE_HOST:localhost}:${SPRING_DATASOURCE_PORT:5432}/${SPRING_DATASOURCE_DATABASE:benchmark}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:benchmark}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:benchmark}
spring.datasource.driver-class-name=org.postgresql.Driver
# update: cria/atualiza tabelas a partir das entidades (item). Para banco vazio, a tabela é criada na 1ª subida.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# MinIO (variáveis: MINIO_URL, MINIO_ROOT_USER, MINIO_ROOT_PASSWORD, MINIO_BUCKET)
app.minio.url=${MINIO_URL:http://localhost:9000}
app.minio.access-key=${MINIO_ROOT_USER:admin}
app.minio.secret-key=${MINIO_ROOT_PASSWORD:admin123456}
app.minio.bucket=${MINIO_BUCKET:benchmark}
